<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Birthday Card</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <article class="card">
      <p class="eyebrow">Ancestor Dispatch</p>
      <h1 id="greeting-title"></h1>
      <p id="subheading" class="subheading"></p>
      <p id="short-message" class="message"></p>

      <section class="meta">
        <div class="meta-item">
          <span class="meta-key">Date</span>
          <span id="date-label" class="meta-value"></span>
        </div>
        <div class="meta-item">
          <span class="meta-key">Recipient</span>
          <span id="recipient-name" class="meta-value"></span>
        </div>
      </section>

      <button id="cta-button" type="button" class="cta"></button>
    </article>

    <script type="module" src="./main.js"></script>
  </body>
</html>
